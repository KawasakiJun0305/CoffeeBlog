name: Generate Coffee Article

on:
  schedule:
    # 月・水・金 09:00 JST (00:00 UTC)
    - cron: "0 0 * * 1,3,5"
  workflow_dispatch:
    inputs:
      topic:
        description: "記事トピック（省略時はデフォルトを使用）"
        required: false
        default: ""
      category:
        description: "カテゴリ (豆・産地 / 抽出・レシピ / カフェ情報 / 道具・機器 / コーヒー文化)"
        required: false
        default: "豆・産地"
      dry_run:
        description: "ドライラン（APIを呼ばずにテスト）"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  generate:
    name: Generate & Save Draft
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Resolve topic
        id: topic
        run: |
          TOPIC="${{ github.event.inputs.topic }}"
          CATEGORY="${{ github.event.inputs.category }}"

          if [ -z "${TOPIC}" ]; then
            INDEX=$(( RANDOM % $(node -e "const t=require('./topics.json');console.log(t.topics.length)") ))
            TOPIC=$(node -e "const t=require('./topics.json');console.log(t.topics[${INDEX}].topic)")
            CATEGORY=$(node -e "const t=require('./topics.json');console.log(t.topics[${INDEX}].category)")
            echo "Auto-selected topic: ${TOPIC} (${CATEGORY})"
          fi

          if [ -z "${CATEGORY}" ]; then
            CATEGORY="豆・産地"
          fi

          echo "topic=${TOPIC}" >> "$GITHUB_OUTPUT"
          echo "category=${CATEGORY}" >> "$GITHUB_OUTPUT"

      - name: Generate article
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          if [ "${DRY_RUN}" = "true" ]; then
            npm run generate -- "${{ steps.topic.outputs.topic }}" "${{ steps.topic.outputs.category }}" --dry-run
          else
            npm run generate -- "${{ steps.topic.outputs.topic }}" "${{ steps.topic.outputs.category }}"
          fi

      - name: Commit generated article
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "feat: add generated coffee article [skip ci]"
          git push
